name:                choose
version:             0.1.0.0
github:              "olligobber/choose"
author:              "olligobber"

dependencies:
- base >= 4.7 && < 5
- optparse-applicative >= 0.18.1 && < 0.20
- random >= 1.2.1.3 && < 1.4

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

executables:
  choose:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N